name: "\U0001F41B Bug Report"
description: Report a bug or something that isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: On which page did the bug occur?
      placeholder: https://buddha-wisdom-two.vercel.app/...

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English
        - Russian
        - Hindi
        - Spanish
        - French
        - German
        - Chinese
        - Japanese

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem.
